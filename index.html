<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlantis Initiative Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <section class="public-section">
            <h2 class="section-title">The Oracle's Vision</h2>
            
            <div id="coin-container">
                <div id="visual-coin" class="coin-graphic"></div>
                <div id="coin-text">TIE-BREAKER POSSESSION</div>
            </div>
            
            <div id="public-board">
                </div>

            <div id="battle-log"></div>

            <button id="new-game-btn" class="danger-btn">RESET NEW GAME</button>
        </section>

        <hr class="mystic-divider">

        <section class="private-section">
            <h2 class="section-title">Your Sanctum</h2>
            
            <div class="input-group">
                <label>Guardian Seat</label>
                <select id="player-select">
                    <option value="" disabled selected>Choose Seat...</option>
                    <option value="p1">Player 1 (Red)</option>
                    <option value="p2">Player 2 (Red)</option>
                    <option value="p3">Player 3 (Red)</option>
                    <option value="p4">Player 4 (Blue)</option>
                    <option value="p5">Player 5 (Blue)</option>
                    <option value="p6">Player 6 (Blue)</option>
                </select>
            </div>

            <div class="input-group">
                <label>Guardian Name</label>
                <input type="text" id="player-name" placeholder="Enter Name...">
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <label>Card Init</label>
                    <input type="number" id="card-init" value="0">
                </div>
                <div class="stat-box">
                    <label>Booster</label>
                    <input type="number" id="booster" value="0">
                </div>
                <div class="stat-box">
                    <label>Level</label>
                    <input type="number" id="level" value="1">
                </div>
            </div>

            <div class="total-display">
                TOTAL INITIATIVE: <span id="total-val">0</span>
            </div>

            <button id="ready-btn">READY UP</button>
        </section>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
