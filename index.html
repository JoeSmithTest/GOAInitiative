<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOA Initiative Tracker</title>
<link rel="stylesheet" href="styles.css">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
<h1>Guardians of Atlantis Initiative Tracker</h1>

<div id="privateSection">
    <h2>Private Section</h2>
    <label for="playerSlot">Select Your Player:</label>
    <select id="playerSlot">
        <option value="">-- Choose Player --</option>
        <option value="0">Player 1 – [RED]</option>
        <option value="1">Player 2 – [RED]</option>
        <option value="2">Player 3 – [RED]</option>
        <option value="3">Player 4 – [BLUE]</option>
        <option value="4">Player 5 – [BLUE]</option>
        <option value="5">Player 6 – [BLUE]</option>
    </select>
    <br>
    <label for="playerName">Name:</label>
    <input type="text" id="playerName">
    <br>
    <label for="playerLevel">Current Level:</label>
    <input type="number" id="playerLevel" min="1" value="1">
    <p>To level up to the next level, it will cost the amount of your current level. E.g. Cost 3 coins to go from level 3 to 4.</p>
    <label for="initiativeBooster">Initiative Booster:</label>
    <input type="number" id="initiativeBooster" min="0" value="0">
    <br>
    <label for="cardInitiative">Current Card Initiative:</label>
    <input type="number" id="cardInitiative" min="0" value="0">
    <br>
    <button id="readyButton">Ready</button>
</div>

<div id="publicSection">
    <h2>Public Turn Order</h2>
    <div id="coinDiv">
        <span id="coinLabel"></span>
    </div>
    <ul id="turnOrderList"></ul>
</div>

<button id="newGameButton">Start New Game</button>

<script src="script.js"></script>
</body>
</html>
